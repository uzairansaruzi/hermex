# Maintainer-only: uploads a build to the production app's internal TestFlight.
# Requires the repo's APP_STORE_CONNECT_* secrets (App Store Connect API key),
# which forks and contributors do not have. Contributor CI lives in pr-ci.yml.

# Runs automatically after validated changes land on master, and can also be run manually from the Actions tab.
name: Internal TestFlight

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      confirm_internal_only:
        description: "Type INTERNAL to confirm this upload is for internal TestFlight only."
        required: true
        type: string
      build_number:
        description: "Optional CFBundleVersion override. Leave blank to use the next App Store Connect build number."
        required: false
        type: string

run-name: "Internal TestFlight from ${{ github.ref_name }}"

permissions:
  contents: read

concurrency:
  group: internal-testflight
  cancel-in-progress: false

jobs:
  upload:
    name: Archive and Upload
    runs-on: macos-26
    environment: internal-testflight
    timeout-minutes: 60

    env:
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
      IOS_DISTRIBUTION_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_P12_BASE64 }}
      IOS_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
      IOS_PROVISIONING_PROFILE_APP_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_APP_BASE64 }}
      IOS_PROVISIONING_PROFILE_SHARE_EXTENSION_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_SHARE_EXTENSION_BASE64 }}
      IOS_PROVISIONING_PROFILE_LIVE_ACTIVITY_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_LIVE_ACTIVITY_BASE64 }}
      EXPORT_OPTIONS_PLIST: ci/TestFlightExportOptions.plist
      PROJECT_PATH: HermesMobile.xcodeproj
      SCHEME: HermesMobile
      TEAM_ID: CY4LHQ7XSH

    steps:
      - name: Check upload gate
        env:
          CONFIRM_INTERNAL_ONLY: ${{ inputs.confirm_internal_only }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_NAME}" != "master" ]]; then
            echo "Internal TestFlight uploads must run from master. Current ref: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && "${CONFIRM_INTERNAL_ONLY}" != "INTERNAL" ]]; then
            echo "Manual uploads must set confirm_internal_only to INTERNAL." >&2
            exit 1
          fi

      - name: Check required secrets
        run: |
          set -euo pipefail

          missing=0
          for name in \
            APP_STORE_CONNECT_KEY_ID \
            APP_STORE_CONNECT_ISSUER_ID \
            APP_STORE_CONNECT_PRIVATE_KEY \
            IOS_DISTRIBUTION_CERTIFICATE_P12_BASE64 \
            IOS_DISTRIBUTION_CERTIFICATE_PASSWORD \
            IOS_PROVISIONING_PROFILE_APP_BASE64 \
            IOS_PROVISIONING_PROFILE_SHARE_EXTENSION_BASE64 \
            IOS_PROVISIONING_PROFILE_LIVE_ACTIVITY_BASE64; do
            if [[ -z "${!name}" ]]; then
              echo "Missing required secret: ${name}" >&2
              missing=1
            fi
          done

          exit "${missing}"

      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set output paths
        run: |
          set -euo pipefail

          {
            echo "ARCHIVE_PATH=${RUNNER_TEMP}/HermesMobile.xcarchive"
            echo "DERIVED_DATA_PATH=${RUNNER_TEMP}/DerivedData"
            echo "EXPORT_PATH=${RUNNER_TEMP}/TestFlightExport"
          } >> "${GITHUB_ENV}"


      - name: Install signing assets
        timeout-minutes: 5
        run: |
          set -euo pipefail

          keychain_path="${RUNNER_TEMP}/sourcebottle-signing.keychain-db"
          keychain_password="$(openssl rand -hex 24)"
          cert_path="${RUNNER_TEMP}/sourcebottle-distribution.p12"
          profiles_dir="${HOME}/Library/MobileDevice/Provisioning Profiles"

          echo "Preparing signing keychain"
          mkdir -p "${profiles_dir}"
          printf "%s" "${IOS_DISTRIBUTION_CERTIFICATE_P12_BASE64}" | base64 --decode > "${cert_path}"

          security create-keychain -p "${keychain_password}" "${keychain_path}"
          security set-keychain-settings -lut 21600 "${keychain_path}"
          security unlock-keychain -p "${keychain_password}" "${keychain_path}"
          security list-keychains -d user -s "${keychain_path}"

          echo "Importing distribution certificate"
          security import "${cert_path}" -k "${keychain_path}" -P "${IOS_DISTRIBUTION_CERTIFICATE_PASSWORD}" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "${keychain_password}" "${keychain_path}"

          install_profile() {
            local encoded="$1"
            local label="$2"
            local tmp_profile="${RUNNER_TEMP}/${label}.mobileprovision"
            printf "%s" "${encoded}" | base64 --decode > "${tmp_profile}"
            local uuid
            uuid="$(security cms -D -i "${tmp_profile}" | plutil -extract UUID raw -o - -)"
            cp "${tmp_profile}" "${profiles_dir}/${uuid}.mobileprovision"
            echo "Installed ${label} provisioning profile ${uuid}"
          }

          echo "Installing provisioning profiles"
          install_profile "${IOS_PROVISIONING_PROFILE_APP_BASE64}" app
          install_profile "${IOS_PROVISIONING_PROFILE_SHARE_EXTENSION_BASE64}" share-extension
          install_profile "${IOS_PROVISIONING_PROFILE_LIVE_ACTIVITY_BASE64}" live-activity

          security find-identity -v -p codesigning "${keychain_path}"

      - name: Detect marketing version
        run: |
          set -euo pipefail

          marketing_version="$(
            xcodebuild \
              -showBuildSettings \
              -project "${PROJECT_PATH}" \
              -scheme "${SCHEME}" \
              -configuration Release 2>/dev/null |
              awk -F'= ' '/MARKETING_VERSION/ { print $2; exit }'
          )"

          if [[ -z "${marketing_version}" ]]; then
            echo "Could not detect MARKETING_VERSION from Xcode build settings." >&2
            exit 1
          fi

          echo "MARKETING_VERSION=${marketing_version}" >> "${GITHUB_ENV}"
          echo "Using marketing version ${marketing_version}"

      - name: Write App Store Connect key
        run: |
          set -euo pipefail

          key_path="${RUNNER_TEMP}/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"
          if [[ "${APP_STORE_CONNECT_PRIVATE_KEY}" == *"\\n"* ]]; then
            printf "%s" "${APP_STORE_CONNECT_PRIVATE_KEY}" | perl -pe 's/\\n/\n/g' > "${key_path}"
          else
            printf "%s" "${APP_STORE_CONNECT_PRIVATE_KEY}" > "${key_path}"
          fi
          chmod 600 "${key_path}"
          echo "APP_STORE_CONNECT_KEY_PATH=${key_path}" >> "${GITHUB_ENV}"

      - name: Select build number
        env:
          BUNDLE_ID: com.sourcebottle.hermex
          REQUESTED_BUILD_NUMBER: ${{ inputs.build_number }}
        run: |
          set -euo pipefail

          build_number="$(ruby ci/select_testflight_build_number.rb)"
          echo "BUILD_NUMBER=${build_number}" >> "${GITHUB_ENV}"
          echo "Using build number ${build_number}"

      - name: Show upload target
        run: |
          set -euo pipefail

          echo "Uploading internal-only TestFlight build"
          echo "Commit SHA: ${GITHUB_SHA}"
          echo "Marketing version: ${MARKETING_VERSION}"
          echo "Build number: ${BUILD_NUMBER}"
          echo "Export options: ${EXPORT_OPTIONS_PLIST}"

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve Swift packages
        run: |
          set -euo pipefail

          xcodebuild \
            -resolvePackageDependencies \
            -project "${PROJECT_PATH}" \
            -scheme "${SCHEME}"

      - name: Archive
        run: |
          set -euo pipefail

          xcodebuild \
            -project "${PROJECT_PATH}" \
            -scheme "${SCHEME}" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "${ARCHIVE_PATH}" \
            -derivedDataPath "${DERIVED_DATA_PATH}" \
            DEVELOPMENT_TEAM="${TEAM_ID}" \
            CURRENT_PROJECT_VERSION="${BUILD_NUMBER}" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            archive

      - name: Upload to App Store Connect
        run: |
          set -euo pipefail

          xcodebuild \
            -exportArchive \
            -archivePath "${ARCHIVE_PATH}" \
            -exportPath "${EXPORT_PATH}" \
            -exportOptionsPlist "${EXPORT_OPTIONS_PLIST}" \
            -authenticationKeyPath "${APP_STORE_CONNECT_KEY_PATH}" \
            -authenticationKeyID "${APP_STORE_CONNECT_KEY_ID}" \
            -authenticationKeyIssuerID "${APP_STORE_CONNECT_ISSUER_ID}"
