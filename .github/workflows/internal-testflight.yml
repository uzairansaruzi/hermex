# Maintainer-only: uploads a build to the production app's internal TestFlight.
# Requires the repo's APP_STORE_CONNECT_* secrets (App Store Connect API key),
# which forks and contributors do not have. Contributor CI lives in pr-ci.yml.

# Run manually from the Actions tab (workflow_dispatch).
name: Internal TestFlight

on:
  workflow_dispatch:
    inputs:
      confirm_internal_only:
        description: "Type INTERNAL to confirm this upload is for internal TestFlight only."
        required: true
        type: string
      build_number:
        description: "Optional CFBundleVersion override. Leave blank to use the next App Store Connect build number."
        required: false
        type: string

run-name: "Internal TestFlight from ${{ github.ref_name }}"

permissions:
  contents: read

concurrency:
  group: internal-testflight
  cancel-in-progress: false

jobs:
  upload:
    name: Archive and Upload
    runs-on: macos-26
    environment: internal-testflight
    timeout-minutes: 60

    env:
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
      EXPORT_OPTIONS_PLIST: ci/TestFlightExportOptions.plist
      PROJECT_PATH: HermesMobile.xcodeproj
      SCHEME: HermesMobile
      TEAM_ID: 6GYD9C9N6R

    steps:
      - name: Check manual gate
        env:
          CONFIRM_INTERNAL_ONLY: ${{ inputs.confirm_internal_only }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_NAME}" != "master" ]]; then
            echo "Internal TestFlight uploads must be run from master. Current ref: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

          if [[ "${CONFIRM_INTERNAL_ONLY}" != "INTERNAL" ]]; then
            echo "Re-run with confirm_internal_only set to INTERNAL." >&2
            exit 1
          fi

      - name: Check required secrets
        env:
          DIST_CERT_P12_BASE64: ${{ secrets.DIST_CERT_P12_BASE64 }}
          DIST_CERT_P12_PASSWORD: ${{ secrets.DIST_CERT_P12_PASSWORD }}
          PROVISION_PROFILE_APP_BASE64: ${{ secrets.PROVISION_PROFILE_APP_BASE64 }}
          PROVISION_PROFILE_SHAREEXT_BASE64: ${{ secrets.PROVISION_PROFILE_SHAREEXT_BASE64 }}
          PROVISION_PROFILE_WIDGET_BASE64: ${{ secrets.PROVISION_PROFILE_WIDGET_BASE64 }}
        run: |
          set -euo pipefail

          missing=0
          for name in \
            APP_STORE_CONNECT_KEY_ID APP_STORE_CONNECT_ISSUER_ID APP_STORE_CONNECT_PRIVATE_KEY \
            DIST_CERT_P12_BASE64 DIST_CERT_P12_PASSWORD \
            PROVISION_PROFILE_APP_BASE64 PROVISION_PROFILE_SHAREEXT_BASE64 PROVISION_PROFILE_WIDGET_BASE64; do
            if [[ -z "${!name}" ]]; then
              echo "Missing required secret: ${name}" >&2
              missing=1
            fi
          done

          exit "${missing}"

      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set output paths
        run: |
          set -euo pipefail

          {
            echo "ARCHIVE_PATH=${RUNNER_TEMP}/HermesMobile.xcarchive"
            echo "DERIVED_DATA_PATH=${RUNNER_TEMP}/DerivedData"
            echo "EXPORT_PATH=${RUNNER_TEMP}/TestFlightExport"
          } >> "${GITHUB_ENV}"

      - name: Detect marketing version
        run: |
          set -euo pipefail

          marketing_version="$(
            xcodebuild \
              -showBuildSettings \
              -project "${PROJECT_PATH}" \
              -scheme "${SCHEME}" \
              -configuration Release 2>/dev/null |
              awk -F'= ' '/MARKETING_VERSION/ { print $2; exit }'
          )"

          if [[ -z "${marketing_version}" ]]; then
            echo "Could not detect MARKETING_VERSION from Xcode build settings." >&2
            exit 1
          fi

          echo "MARKETING_VERSION=${marketing_version}" >> "${GITHUB_ENV}"
          echo "Using marketing version ${marketing_version}"

      - name: Write App Store Connect key
        run: |
          set -euo pipefail

          key_path="${RUNNER_TEMP}/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"
          if [[ "${APP_STORE_CONNECT_PRIVATE_KEY}" == *"\\n"* ]]; then
            printf "%s" "${APP_STORE_CONNECT_PRIVATE_KEY}" | perl -pe 's/\\n/\n/g' > "${key_path}"
          else
            printf "%s" "${APP_STORE_CONNECT_PRIVATE_KEY}" > "${key_path}"
          fi
          chmod 600 "${key_path}"
          echo "APP_STORE_CONNECT_KEY_PATH=${key_path}" >> "${GITHUB_ENV}"

      - name: Select build number
        env:
          BUNDLE_ID: com.uzairansar.hermesmobile
          REQUESTED_BUILD_NUMBER: ${{ inputs.build_number }}
        run: |
          set -euo pipefail

          build_number="$(ruby ci/select_testflight_build_number.rb)"
          echo "BUILD_NUMBER=${build_number}" >> "${GITHUB_ENV}"
          echo "Using build number ${build_number}"

      - name: Show upload target
        run: |
          set -euo pipefail

          echo "Uploading internal-only TestFlight build"
          echo "Commit SHA: ${GITHUB_SHA}"
          echo "Marketing version: ${MARKETING_VERSION}"
          echo "Build number: ${BUILD_NUMBER}"
          echo "Export options: ${EXPORT_OPTIONS_PLIST}"

      - name: Import signing assets
        env:
          DIST_CERT_P12_BASE64: ${{ secrets.DIST_CERT_P12_BASE64 }}
          DIST_CERT_P12_PASSWORD: ${{ secrets.DIST_CERT_P12_PASSWORD }}
          PROVISION_PROFILE_APP_BASE64: ${{ secrets.PROVISION_PROFILE_APP_BASE64 }}
          PROVISION_PROFILE_SHAREEXT_BASE64: ${{ secrets.PROVISION_PROFILE_SHAREEXT_BASE64 }}
          PROVISION_PROFILE_WIDGET_BASE64: ${{ secrets.PROVISION_PROFILE_WIDGET_BASE64 }}
        run: |
          set -euo pipefail

          KEYCHAIN_PATH="${RUNNER_TEMP}/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          echo "SIGNING_KEYCHAIN_PATH=${KEYCHAIN_PATH}" >> "${GITHUB_ENV}"

          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 3600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security list-keychains -d user -s "${KEYCHAIN_PATH}" $(security list-keychains -d user | tr -d '"')

          echo "${DIST_CERT_P12_BASE64}" | base64 --decode > "${RUNNER_TEMP}/dist_cert.p12"
          security import "${RUNNER_TEMP}/dist_cert.p12" \
            -k "${KEYCHAIN_PATH}" \
            -P "${DIST_CERT_P12_PASSWORD}" \
            -A -t cert -f pkcs12
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          rm -f "${RUNNER_TEMP}/dist_cert.p12"

          PP_DIR="${HOME}/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "${PP_DIR}"
          echo "${PROVISION_PROFILE_APP_BASE64}"      | base64 --decode > "${PP_DIR}/hermex_app.mobileprovision"
          echo "${PROVISION_PROFILE_SHAREEXT_BASE64}" | base64 --decode > "${PP_DIR}/hermex_shareext.mobileprovision"
          echo "${PROVISION_PROFILE_WIDGET_BASE64}"   | base64 --decode > "${PP_DIR}/hermex_widget.mobileprovision"

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve Swift packages
        run: |
          set -euo pipefail

          xcodebuild \
            -resolvePackageDependencies \
            -project "${PROJECT_PATH}" \
            -scheme "${SCHEME}"

      - name: Archive
        run: |
          set -euo pipefail

          xcodebuild \
            -project "${PROJECT_PATH}" \
            -scheme "${SCHEME}" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "${ARCHIVE_PATH}" \
            -derivedDataPath "${DERIVED_DATA_PATH}" \
            -authenticationKeyPath "${APP_STORE_CONNECT_KEY_PATH}" \
            -authenticationKeyID "${APP_STORE_CONNECT_KEY_ID}" \
            -authenticationKeyIssuerID "${APP_STORE_CONNECT_ISSUER_ID}" \
            DEVELOPMENT_TEAM="${TEAM_ID}" \
            CURRENT_PROJECT_VERSION="${BUILD_NUMBER}" \
            archive

      - name: Upload to App Store Connect
        run: |
          set -euo pipefail

          xcodebuild \
            -exportArchive \
            -archivePath "${ARCHIVE_PATH}" \
            -exportPath "${EXPORT_PATH}" \
            -exportOptionsPlist "${EXPORT_OPTIONS_PLIST}" \
            -authenticationKeyPath "${APP_STORE_CONNECT_KEY_PATH}" \
            -authenticationKeyID "${APP_STORE_CONNECT_KEY_ID}" \
            -authenticationKeyIssuerID "${APP_STORE_CONNECT_ISSUER_ID}"

      - name: Clean up signing assets
        if: always()
        run: |
          security delete-keychain "${SIGNING_KEYCHAIN_PATH}" 2>/dev/null || true
          rm -f \
            "${HOME}/Library/MobileDevice/Provisioning Profiles/hermex_app.mobileprovision" \
            "${HOME}/Library/MobileDevice/Provisioning Profiles/hermex_shareext.mobileprovision" \
            "${HOME}/Library/MobileDevice/Provisioning Profiles/hermex_widget.mobileprovision"
