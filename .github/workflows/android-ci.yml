# Android CI: unit tests, lint, and build on every pull request that touches
# Android code. iOS-only or docs-only PRs skip this runner entirely.
#
# Uses no repository secrets, so PRs from forks get green CI too.

name: Android CI

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: android-ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      run_android: ${{ steps.filter.outputs.run_android }}
    steps:
      - name: Classify changed files
        id: filter
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          files=$(gh api "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" \
            --paginate --jq '.[].filename')
          echo "Changed files:"
          echo "${files}"
          # Check for Android-relevant files.
          android=$(echo "${files}" | grep -E '^(app/|.*\.gradle\.kts$|.*\.gradle$|gradle/|gradlew|gradlew\.bat|settings\.gradle)' || true)
          if [[ -n "${android}" ]]; then
            echo "Android changes detected:"
            echo "${android}"
            echo "run_android=true" >> "$GITHUB_OUTPUT"
          else
            echo "No Android changes — skipping."
            echo "run_android=false" >> "$GITHUB_OUTPUT"
          fi

  build-and-test:
    name: Build and Test
    needs: changes
    if: needs.changes.outputs.run_android == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest --no-daemon

      - name: Run lint
        run: ./gradlew :app:lintDebug --no-daemon

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Upload lint results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lint-results
          path: app/build/reports/lint-results-debug.html
          if-no-files-found: ignore

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: app/build/reports/tests/testDebugUnitTest/
          if-no-files-found: ignore

  gate:
    name: Android CI Gate
    needs: [changes, build-and-test]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check results
        run: |
          set -euo pipefail
          echo "changes: ${{ needs.changes.result }}"
          echo "build-and-test: ${{ needs.build-and-test.result }}"
          if [[ "${{ needs.changes.result }}" != "success" ]]; then
            echo "Path detection failed." >&2
            exit 1
          fi
          case "${{ needs.build-and-test.result }}" in
            success|skipped) echo "Android CI gate passed." ;;
            *) echo "Android build/test did not pass." >&2; exit 1 ;;
          esac
